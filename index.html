<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사랑의빛교회 방송용 툴</title>

  <style>
    /* 모든 요소에 box-sizing: border-box 적용하여 패딩으로 인한 사이즈 넘침 방지 */
    * {
      box-sizing: border-box;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow-y: auto;
      /* 세로 스크롤 허용 */
      background-color: #cbd5e1;
      /* 진한 청회색 배경으로 변경 (가시성 확보) */
    }

    #root {
      min-height: 100%;
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
